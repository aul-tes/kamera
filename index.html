<!doctype html>
<html>
  <head>
    <title>Mood Learning System</title>
    <style>
      body {
        font-family: Arial;
        text-align: center;
        background-color: #f4f4f4;
      }
      .container {
        width: 80%;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
      }
      video {
        border-radius: 10px;
        margin-top: 10px;
      }
      .mood-box {
        margin-top: 20px;
        padding: 10px;
        font-size: 20px;
        font-weight: bold;
      }
      .content {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        background: #eee;
      }
      button {
        padding: 10px 20px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 5px;
      }
      button:hover {
        background: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Mood-Based Learning System</h1>
      <button onclick="startCamera()">Aktifkan Kamera</button><br /><br />
      <video id="video" width="300" autoplay></video>
      <div class="mood-box" id="moodText">Mood: -</div>
      <div class="content" id="contentArea">Materi akan muncul di sini</div>
    </div>

    <script>
      let currentMood = "-";
      let intervalId = null;

      // 🔹 Aktifkan kamera + auto deteksi
      function startCamera() {
        navigator.mediaDevices
          .getUserMedia({ video: true })
          .then((stream) => {
            document.getElementById("video").srcObject = stream;
            intervalId = setInterval(detectMood, 3000); // auto deteksi tiap 3 detik
          })
          .catch(() => alert("Kamera tidak bisa diakses"));
      }

      // 🔹 Deteksi mood (dummy random)
      function detectMood() {
        const moods = ["happy", "sad", "tired"];
        currentMood = moods[Math.floor(Math.random() * moods.length)];
        document.getElementById("moodText").innerText = "Mood: " + currentMood;
        changeUI(currentMood);
        showContent(currentMood);
      }

      // 🔹 Ubah UI sesuai mood
      function changeUI(mood) {
        if (mood === "happy") document.body.style.backgroundColor = "#d4edda";
        else if (mood === "sad")
          document.body.style.backgroundColor = "#f8d7da";
        else if (mood === "tired")
          document.body.style.backgroundColor = "#fff3cd";
      }

      // 🔹 Tampilkan materi sesuai mood
      function showContent(mood) {
        const content = document.getElementById("contentArea");
        if (mood === "happy") content.innerHTML = "Materi lengkap + soal sulit";
        else if (mood === "sad")
          content.innerHTML = "Video pendek + penjelasan ringan";
        else if (mood === "tired")
          content.innerHTML = "Ringkasan materi singkat";
      }
    </script>
  </body>
</html>
